<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algorithms Project — Coming Soon</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    :root {
      --text: #e8eef6;
      --text-muted: #9bb0c8;
      --accent: #6eb8ff;
      --accent-soft: rgba(110, 184, 255, 0.15);
      --border: rgba(232, 238, 246, 0.12);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(
        155deg,
        #050d18 0%,
        #0a1e3d 35%,
        #0d2848 55%,
        #071326 100%
      );
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      line-height: 1.6;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
        gap: 1rem;
      padding: 0.85rem 1.5rem;
      background: rgba(5, 13, 24, 0.75);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .brand {
      font-weight: 700;
      letter-spacing: 0.04em;
      text-decoration: none;
      color: var(--text);
      font-size: 1rem;
    }

    .brand span {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      align-items: center;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.4rem 0.75rem;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: color 0.15s, background 0.15s;
    }

    .nav-links a:hover,
    .nav-links a:focus-visible {
      color: var(--text);
      background: var(--accent-soft);
      outline: none;
    }

    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .hero {
      text-align: center;
      padding: 2rem 0 1rem;
    }

    .hero-badge {
      display: inline-block;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid rgba(110, 184, 255, 0.35);
    }

    h1 {
      font-size: clamp(1.85rem, 5vw, 2.5rem);
      font-weight: 700;
      line-height: 1.2;
      margin: 1.25rem 0 0.5rem;
    }

    .lead {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin: 0 0 2rem;
    }

    .section {
      margin-top: 2.5rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }

    .section h2 {
      font-size: 1.1rem;
      margin: 0 0 1rem;
      color: var(--text);
    }

    .team-grid {
      display: grid;
      gap: 0.65rem;
    }

    .team-grid a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1rem;
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      background: rgba(14, 40, 72, 0.45);
      border: 1px solid var(--border);
      transition: border-color 0.15s, background 0.15s;
    }

    .team-grid a:hover,
    .team-grid a:focus-visible {
      border-color: rgba(110, 184, 255, 0.4);
      background: rgba(14, 48, 88, 0.55);
      outline: none;
    }

    .team-grid a span {
      color: var(--accent);
      font-size: 0.85rem;
    }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Algorithms <span>Project</span></a>
    <nav class="nav-links" aria-label="Main">
      <a href="index.html#top">Home</a>
      <a href="esraa.html">Esraa</a>
      <a href="fatima.html">Fatima</a>
      <a href="ghena.html">Ghena</a>
      <a href="aya.html">Aya</a>
    </nav>
  </header>

  <main id="top">
    <section class="hero">
      <p class="hero-badge">Coming soon</p>
      <h1>Algorithms Project</h1>
      <p class="lead">
        We are building something new. Check back soon, or jump to a teammate’s page below.
      </p>
    </section>

    <section class="section">
      <h2>Team pages</h2>
      <div class="team-grid">
        <a href="esraa.html">Esraa’s page <span>→</span></a>
        <a href="fatima.html">Fatima’s page <span>→</span></a>
        <a href="ghena.html">Ghena’s page <span>→</span></a>
        <a href="aya.html">Aya’s page <span>→</span></a>
      </div>
    </section>
  </main>

  <footer>
    <p>© <span id="year"></span> Algorithms Project</p>
  </footer>

  <script>
    (function () {
      var yearEl = document.getElementById("year");
      if (yearEl) {
        yearEl.textContent = String(new Date().getFullYear());
      }
    })();
  </script>
</body>
</html>
